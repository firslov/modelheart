<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Heart</title>
    <link rel="icon" href="static/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        async function generateApiKey() {
            const phone = document.getElementById('phone_input').value;
            if (!phone) {
                showMessage('请输入手机号', true);
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showMessage('请输入有效的手机号', true);
                return;
            }
            try {
                const response = await fetch('/generate-api-key', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ phone }),
                });
                if (!response.ok) {
                    throw new Error(`Server response error: ${response.status}`);
                }
                const data = await response.json();
                if (data.error) {
                    showMessage(data.error, true);
                } else {
                    const apiKey = data.api_key;
                    document.getElementById('api_key_display').textContent = apiKey;
                    showMessage('API密钥生成成功!');
                }
            } catch (error) {
                console.error('Generating API key failed:', error);
                showMessage('生成API密钥失败: ' + error.message, true);
            }
        }


        function copyToClipboard(elementId) {
            var text = document.getElementById(elementId).innerText;
            var dummy = document.createElement("textarea");
            dummy.style.position = 'absolute';
            dummy.style.left = '-9999px';
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            showMessage("Copied to clipboard!");
        }

        function showMessage(message, isError) {
            const messageArea = document.getElementById('message_area');
            messageArea.textContent = message;
            messageArea.className = isError ? 'bg-red-100 text-red-700 p-4 rounded' : 'bg-green-100 text-green-700 p-4 rounded';
            messageArea.style.display = 'block';
            messageArea.classList.add('fade-in');
            setTimeout(() => {
                messageArea.style.display = 'none';
                messageArea.classList.remove('fade-in');
            }, 3000);
        }

        async function loadModels() {
            try {
                const response = await fetch('/get-models');
                const data = await response.json();
                const modelList = document.getElementById('model_list');
                modelList.innerHTML = '';

                data.models.forEach(model => {
                    const div = document.createElement('div');
                    div.className = 'model-item';
                    div.textContent = model;
                    modelList.appendChild(div);
                });

                // 修改高度计算逻辑
                const modelCount = data.models.length;
                const itemHeight = 48; // 每个model-item的高度（包括padding和border）
                const maxVisibleItems = 6; // 最多显示的项目数（用于视觉显示，不限制实际内容）
                const maxHeight = maxVisibleItems * itemHeight; // 固定显示区域的最大高度

                // 设置固定的最大显示高度
                document.documentElement.style.setProperty('--model-list-max-height', `${maxHeight}px`);

                // 如果有更多项目，添加滚动样式
                if (modelCount > maxVisibleItems) {
                    const modelListElement = document.querySelector('.model-list');
                    if (modelListElement) {
                        modelListElement.classList.add('scrollable');
                    }
                }
            } catch (error) {
                console.error('Loading models failed:', error);
            }
        }

        function showContactModal() {
            const modal = document.getElementById('contactModal');
            modal.classList.remove('hidden');
            modal.classList.add('fade-in');
        }

        function hideContactModal() {
            const modal = document.getElementById('contactModal');
            modal.classList.add('hidden');
            modal.classList.remove('fade-in');
        }

        // Close modal when clicking outside
        document.addEventListener('click', function (event) {
            const modal = document.getElementById('contactModal');
            if (event.target === modal) {
                hideContactModal();
            }
        });

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadModels);
    </script>

    <style>
        /* 现代化设计系统 */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --background: #f8fafc;
            --card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        .slide-in {
            animation: slideIn 0.4s ease-out;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* 现代化卡片设计 */
        .card {
            background: linear-gradient(135deg, var(--card) 0%, #fafbfc 100%);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-xl);
            transform: translateY(-4px);
        }

        .card:hover::before {
            opacity: 1;
        }

        /* 现代化按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: var(--shadow-md);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-icon {
            padding: 0.75rem;
            border-radius: 12px;
            background: var(--primary);
        }

        /* 现代化输入框 */
        .input-modern {
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--card);
            box-shadow: var(--shadow-sm);
        }

        .input-modern:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        /* 现代化滚动条 */
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: var(--primary-light) var(--border);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 4px;
            border: 2px solid var(--border);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* 信息卡片样式 */
        .info-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
        }

        .info-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Model列表现代化设计 */
        .model-list-container {
            position: relative;
        }

        .model-list {
            max-height: 0;
            overflow-y: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .model-list.scrollable {
            overflow-y: auto;
        }

        .model-list-container:hover .model-list {
            max-height: var(--model-list-max-height, 288px);
        }

        .model-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .model-item:last-child {
            border-bottom: none;
        }

        .model-item:hover {
            background: linear-gradient(90deg, #f8fafc 0%, #f1f5f9 100%);
            transform: translateX(4px);
        }

        .model-item::before {
            content: '▸';
            color: var(--primary);
            font-size: 0.875rem;
        }

        /* 文本样式优化 */
        .truncate-text {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        @media (min-width: 768px) {
            .truncate-text {
                max-width: 500px;
            }
        }

        /* 模态框现代化 */
        .modal {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border);
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        #contactModal.fade-in {
            animation: modalFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 响应式优化 */
        @media (max-width: 768px) {
            .card {
                border-radius: 12px;
                margin: 0.5rem;
            }

            .btn {
                padding: 0.875rem 1.25rem;
                font-size: 0.9rem;
            }

            .input-modern {
                padding: 0.75rem;
                font-size: 1rem;
            }

            .info-card {
                padding: 1.25rem;
            }
        }

        @media (max-width: 640px) {
            .card {
                border-radius: 10px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .truncate-text {
                max-width: 100%;
                font-size: 0.875rem;
            }
        }

        /* Footer icons hover effect */
        .footer-icon {
            transition: transform 0.2s ease-in-out;
        }

        .footer-icon:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="bg-gradient-to-r from-blue-50 to-green-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white shadow-2xl rounded-xl p-6 w-full max-w-4xl fade-in">
        <!-- Header Navigation -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8">
            <div class="flex items-center">
                <i class="fas fa-server text-indigo-600 text-lg mr-3"></i>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">
                    API <span class="text-indigo-600">Service</span>
                </h1>
            </div>

            <div class="flex flex-col md:flex-row gap-3 mt-4 md:mt-0">
                <a href="https://chat.aihao.world/" target="_blank"
                    class="btn flex items-center bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700">
                    <i class="fas fa-comments mr-2"></i>
                    <span>HaoAI Chat</span>
                </a>
                <a href="/get-usage" class="btn flex items-center">
                    <i class="fas fa-chart-bar mr-2"></i>
                    <span>Dashboard & Management</span>
                </a>
            </div>
        </div>

        <!-- API Key Generation Area -->
        <div class="card fade-in mb-6">
            <div class="p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-key text-indigo-600 text-lg mr-2"></i>
                    获取API密钥
                </h2>
                <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-4">
                    <input type="tel" id="phone_input" class="input-modern flex-grow w-full md:w-auto"
                        placeholder="请输入手机号">
                    <button onclick="generateApiKey()" class="btn w-full md:w-auto">
                        <i class="fas fa-key mr-2"></i>
                        获取API密钥
                    </button>
                </div>
            </div>
        </div>

        <!-- API Information Display Area -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- API Key Display -->
            <div class="info-card fade-in">
                <div class="flex flex-col h-full">
                    <div class="flex items-center mb-3">
                        <div class="bg-indigo-100 p-2 rounded-lg mr-3">
                            <i class="fas fa-key text-indigo-600 text-lg"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-gray-800">API密钥</h3>
                    </div>
                    <div class="flex-1 flex items-center justify-between">
                        <span id="api_key_display" class="truncate-text text-gray-700">生成API密钥后请保存</span>
                        <button onclick="copyToClipboard('api_key_display')" class="btn-icon ml-3">
                            <i class="fas fa-copy text-white"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Base URL 显示 -->
            <div class="info-card fade-in">
                <div class="flex flex-col h-full">
                    <div class="flex items-center mb-3">
                        <div class="bg-green-100 p-2 rounded-lg mr-3">
                            <i class="fas fa-link text-green-600 text-lg"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-gray-800">Base URL</h3>
                    </div>
                    <div class="flex-1 flex items-center justify-between">
                        <span id="base_url_display" class="truncate-text text-gray-700">https://api.aihao.world</span>
                        <button onclick="copyToClipboard('base_url_display')" class="btn-icon ml-3">
                            <i class="fas fa-copy text-white"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Model 列表 -->
            <div class="info-card fade-in model-list-container md:col-span-2">
                <div class="flex flex-col h-full">
                    <div class="flex items-center mb-3">
                        <div class="bg-purple-100 p-2 rounded-lg mr-3">
                            <i class="fas fa-cube text-purple-600 text-lg"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-gray-800">支持的模型</h3>
                    </div>
                    <div class="model-list" id="model_list">

                    </div>

            <!-- Usage 显示 -->

                    </div>

        <!-- 消息提示区域 -->
        <div id="message_area" class="mt-4 hidden"></div>

        <!-- Footer -->
        <div class="mt-8 flex justify-center space-x-6">
            <a href="https://github.com/firslov/MyAPI" target="_blank"
                class="text-gray-600 hover:text-indigo-600 transition-colors hover-scale footer-icon">
                <i class="fab fa-github text-2xl"></i>
            </a>
            <a href="https://www.cherry-ai.com/download" target="_blank"
                class="text-gray-600 hover:text-indigo-600 transition-colors hover-scale footer-icon">
                <i class="fas fa-download text-2xl"></i>
            </a>
            <button onclick="showContactModal()"
                class="text-gray-600 hover:text-indigo-600 transition-colors hover-scale footer-icon">
                <i class="fas fa-user-circle text-2xl"></i>
            </button>
        </div>
    </div>

    <!-- Contact Modal -->
    <div id="contactModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full mx-4 relative">
            <button onclick="hideContactModal()" class="absolute top-2 right-2 text-gray-500 hover:text-gray-700">
                <i class="fas fa-times text-xl"></i>
            </button>
            <div class="text-center">
                <h3 class="text-xl font-bold text-gray-800 mb-4">联系作者</h3>
                <img src="/static/contact-qr.jpg" alt="Contact QR Code" class="mx-auto w-64 h-64 object-contain">
                <p class="mt-4 text-gray-600">扫描二维码联系作者</p>
            </div>
        </div>
    </div>
</body>

</html>
