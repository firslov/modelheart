<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - Model Heart</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a0a0b' rx='4'/%3E%3Ctext x='16' y='22' font-family='JetBrains Mono, monospace' font-size='14' font-weight='500' fill='%2300f5d4' text-anchor='middle'%3EMH%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ========================================
           HAO WORLD UI DESIGN SYSTEM
           极简科技风 / Dark Tech / Cyber Minimal
           ======================================== */

        :root {
            /* 背景色系 */
            --bg-primary: #0a0a0b;
            --bg-secondary: #111113;
            --bg-card: #18181b;

            /* 边框色系 */
            --border: #27272a;
            --border-hover: #3f3f46;

            /* 强调色 */
            --accent: #00f5d4;
            --accent-dim: rgba(0, 245, 212, 0.15);

            /* 文字色系 */
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;

            /* 装饰元素 */
            --grid-line: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }

        /* ========================================
           背景效果系统
           ======================================== */

        /* 网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
            pointer-events: none;
        }

        /* 噪点纹理 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: 2;
            pointer-events: none;
        }

        /* 环境光晕 */
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: ambientFloat 30s ease-in-out infinite;
        }

        .ambient-glow-1 {
            top: -200px;
            right: -200px;
        }

        .ambient-glow-2 {
            bottom: -200px;
            left: -200px;
            animation-delay: -15s;
        }

        @keyframes ambientFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, 30px) scale(1.1); }
            50% { transform: translate(20px, -40px) scale(0.9); }
            75% { transform: translate(-30px, 20px) scale(1.05); }
        }

        /* ========================================
           登录容器
           ======================================== */

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            position: relative;
            z-index: 10;
            animation: fadeSlideUp 0.6s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========================================
           登录卡片
           ======================================== */

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: var(--accent);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card:hover::before {
            width: 3px;
        }

        /* ========================================
           卡片头部
           ======================================== */

        .login-header {
            padding: 3rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        /* Logo */
        .logo-icon {
            display: inline-block;
            width: 48px;
            height: 48px;
            position: relative;
            margin-bottom: 1.5rem;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--accent);
            opacity: 0.3;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            inset: 8px;
            background: var(--accent);
        }

        /* 标题 */
        .login-title {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 300;
            font-size: clamp(1.5rem, 4vw, 2rem);
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 300;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ========================================
           卡片主体
           ======================================== */

        .login-body {
            padding: 2rem;
        }

        /* 表单组 */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-card);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .login-btn:hover {
            border-color: var(--accent);
            background: var(--bg-card);
        }

        .login-btn i {
            color: var(--accent);
        }

        .login-btn.loading {
            color: transparent;
            pointer-events: none;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误消息 */
        .error-message {
            padding: 0.75rem 1rem;
            margin-top: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* ========================================
           卡片底部
           ======================================== */

        .login-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            text-align: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .back-link i {
            font-size: 0.7rem;
        }

        /* ========================================
           滚动条
           ======================================== */

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ========================================
           响应式
           ======================================== */

        @media (max-width: 768px) {
            .login-container {
                padding: 1.5rem;
            }

            .login-header {
                padding: 2rem 1.5rem 1.5rem;
            }

            .login-body {
                padding: 1.5rem;
            }

            .login-footer {
                padding: 1rem 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }

            .login-header {
                padding: 1.5rem 1rem 1rem;
            }

            .login-body {
                padding: 1rem;
            }

            .login-footer {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 环境光晕 -->
    <div class="ambient-glow ambient-glow-1"></div>
    <div class="ambient-glow ambient-glow-2"></div>

    {% if error %}
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            showError('{{ error }}');
        });
    </script>
    {% endif %}

    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo-icon"></div>
                <h1 class="login-title">管理员登录</h1>
                <p class="login-subtitle">访问控制台</p>
            </div>

            <!-- Body -->
            <div class="login-body">
                <form id="loginForm" method="post" action="/login">
                    <div class="form-group">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" name="username" id="username" required placeholder="请输入管理员用户名"
                            class="form-input" autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" name="password" id="password" required placeholder="请输入管理员密码"
                            class="form-input" autocomplete="current-password">
                    </div>

                    <button type="submit" class="login-btn" id="loginButton">
                        <i class="fas fa-arrow-right-to-bracket"></i>
                        <span>登录管理面板</span>
                    </button>
                </form>

                <div id="error-message" class="error-message">
                    <span id="error-text"></span>
                </div>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <a href="/" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    <span>返回首页</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('loginButton');

            document.getElementById('error-message').classList.remove('show');

            if (!username.trim() || !password.trim()) {
                e.preventDefault();
                showError('请输入用户名和密码');
                return;
            }

            if (password.length < 3) {
                e.preventDefault();
                showError('密码长度至少为3位');
                return;
            }

            loginButton.classList.add('loading');
            loginButton.disabled = true;
        });

        function showError(message) {
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            errorText.textContent = message;
            errorMessage.classList.add('show');

            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                const form = document.getElementById('loginForm');
                const activeElement = document.activeElement;

                if (activeElement.tagName === 'INPUT' && form) {
                    e.preventDefault();
                    if (typeof form.requestSubmit === 'function') {
                        form.requestSubmit();
                    } else {
                        form.submit();
                    }
                }
            }

            if (e.key === 'Escape') {
                document.getElementById('error-message').classList.remove('show');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const card = document.querySelector('.login-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';

            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);

            setTimeout(() => {
                document.getElementById('username').focus();
            }, 800);
        });

        let isSubmitting = false;
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            if (isSubmitting) {
                e.preventDefault();
                return false;
            }
            isSubmitting = true;
            setTimeout(() => {
                isSubmitting = false;
            }, 3000);
        });
    </script>
</body>
</html>
