<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - Model Heart</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0a0e17;
            --bg-card: rgba(15, 23, 42, 0.6);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --bg-glass-hover: rgba(255, 255, 255, 0.06);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --accent-cyan: #22d3ee;
            --accent-purple: #a78bfa;
            --accent-pink: #f472b6;
            --accent-gold: #fbbf24;
            --accent-green: #34d399;
            --accent-error: #ef4444;

            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(34, 211, 238, 0.3);

            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 60px rgba(34, 211, 238, 0.15);

            --gradient-primary: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
            --gradient-surface: linear-gradient(180deg, rgba(15, 23, 42, 0.8) 0%, rgba(15, 23, 42, 0.95) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Manrope', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(34, 211, 238, 0.15), transparent 50%),
                radial-gradient(ellipse 60% 40% at 100% 50%, rgba(167, 139, 250, 0.1), transparent 50%),
                radial-gradient(ellipse 50% 30% at 0% 80%, rgba(244, 114, 182, 0.08), transparent 50%);
            z-index: 0;
            animation: bgShift 20s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* Grid Pattern */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: 1;
            pointer-events: none;
            mask-image: radial-gradient(ellipse 80% 50% at 50% 50%, black 0%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 50% at 50% 50%, black 0%, transparent 70%);
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-cyan);
            top: -100px;
            right: -100px;
            animation: float1 25s ease-in-out infinite;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--accent-purple);
            bottom: -50px;
            left: -50px;
            animation: float2 30s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-50px, 50px) scale(1.1); }
            66% { transform: translate(30px, -30px) scale(0.9); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -40px) scale(0.95); }
            66% { transform: translate(-30px, 20px) scale(1.05); }
        }

        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Login Card */
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            box-shadow: var(--shadow-card);
            overflow: hidden;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                var(--accent-cyan),
                var(--accent-purple),
                transparent);
            opacity: 0.5;
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .login-card:hover::after {
            opacity: 0.03;
        }

        /* Header */
        .login-header {
            padding: 3rem 2.5rem 2rem;
            text-align: center;
            position: relative;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .logo-ring {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid var(--accent-cyan);
            border-radius: 50%;
            animation: pulseRing 3s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
        }

        .logo-icon {
            font-size: 2.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.5));
        }

        .login-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            letter-spacing: 0.05em;
        }

        /* Divider */
        .login-divider {
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                var(--border-subtle) 20%,
                var(--border-subtle) 80%,
                transparent 100%);
            margin: 0 2.5rem 2rem;
            position: relative;
        }

        .login-divider::before {
            content: 'AUTHENTICATION';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-deep);
            color: var(--text-muted);
            padding: 0 1rem;
            font-family: 'Geist Mono', monospace;
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.15em;
        }

        /* Form */
        .login-form {
            padding: 0 2.5rem 2.5rem;
        }

        .form-group {
            margin-bottom: 1.75rem;
            position: relative;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8125rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid var(--border-subtle);
            border-radius: 12px;
            font-family: 'Manrope', sans-serif;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-input:focus + .input-icon {
            color: var(--accent-cyan);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 1.125rem 2rem;
            font-family: 'Manrope', sans-serif;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 20px rgba(34, 211, 238, 0.3);
            margin-top: 1rem;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 211, 238, 0.5);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            color: transparent;
            pointer-events: none;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-error);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            font-size: 0.875rem;
            text-align: center;
            display: none;
            margin-top: 1.5rem;
            animation: shake 0.5s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        .error-message i {
            margin-right: 0.5rem;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Back Link */
        .back-link {
            text-align: center;
            padding: 2rem 2.5rem;
            border-top: 1px solid var(--border-subtle);
            position: relative;
        }

        .back-link::before {
            content: '←';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-deep);
            color: var(--text-muted);
            padding: 0 0.75rem;
            font-size: 1rem;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0.625rem 1.25rem;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-glass);
        }

        .back-link a:hover {
            color: var(--accent-cyan);
            border-color: var(--accent-cyan);
            background: rgba(34, 211, 238, 0.1);
            transform: translateY(-2px);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyan);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                padding: 1.5rem;
            }

            .login-header {
                padding: 2.5rem 2rem 1.5rem;
            }

            .login-form {
                padding: 0 2rem 2rem;
            }

            .login-title {
                font-size: 1.75rem;
            }

            .back-link {
                padding: 1.5rem 2rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }

            .login-header {
                padding: 2rem 1.5rem 1.25rem;
            }

            .login-form {
                padding: 0 1.5rem 1.5rem;
            }

            .back-link {
                padding: 1.25rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    {% if error %}
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            showError('{{ error }}');
        });
    </script>
    {% endif %}

    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo-container">
                    <div class="logo-ring"></div>
                    <i class="fas fa-shield-halved logo-icon"></i>
                </div>
                <h1 class="login-title">管理员登录</h1>
                <p class="login-subtitle">访问控制台</p>
            </div>

            <!-- Divider -->
            <div class="login-divider"></div>

            <!-- Form -->
            <form id="loginForm" class="login-form" method="post" action="/login">
                <div class="form-group">
                    <label for="username" class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <input type="text" name="username" id="username" required placeholder="请输入管理员用户名"
                            class="form-input" autocomplete="username">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">密码</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" id="password" required placeholder="请输入管理员密码"
                            class="form-input" autocomplete="current-password">
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginButton">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    <span>登录管理面板</span>
                </button>
            </form>

            <!-- Error Message -->
            <div id="error-message" class="error-message">
                <i class="fas fa-circle-exclamation"></i>
                <span id="error-text"></span>
            </div>

            <!-- Back Link -->
            <div class="back-link">
                <a href="/">
                    <i class="fas fa-home"></i>
                    <span>返回首页</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('loginButton');

            document.getElementById('error-message').classList.remove('show');

            if (!username.trim() || !password.trim()) {
                e.preventDefault();
                showError('请输入用户名和密码');
                return;
            }

            if (password.length < 3) {
                e.preventDefault();
                showError('密码长度至少为3位');
                return;
            }

            loginButton.classList.add('loading');
            loginButton.disabled = true;
        });

        function showError(message) {
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            errorText.textContent = message;
            errorMessage.classList.add('show');

            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('.input-icon').style.color = 'var(--accent-cyan)';
            });

            input.addEventListener('blur', function() {
                this.parentElement.querySelector('.input-icon').style.color = 'var(--text-muted)';
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                const form = document.getElementById('loginForm');
                const activeElement = document.activeElement;

                if (activeElement.tagName === 'INPUT' && form) {
                    e.preventDefault();
                    if (typeof form.requestSubmit === 'function') {
                        form.requestSubmit();
                    } else {
                        form.submit();
                    }
                }
            }

            if (e.key === 'Escape') {
                document.getElementById('error-message').classList.remove('show');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const card = document.querySelector('.login-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';

            setTimeout(() => {
                card.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);

            setTimeout(() => {
                document.getElementById('username').focus();
            }, 1000);
        });

        let isSubmitting = false;
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            if (isSubmitting) {
                e.preventDefault();
                return false;
            }
            isSubmitting = true;
            setTimeout(() => {
                isSubmitting = false;
            }, 3000);
        });
    </script>
</body>
</html>
